name: Publish branch snapshot to themeontology.org search

# When commits land on a tracked development branch, ask the totolo-search-web repo to
# build a self-contained search site from THIS branch's notes/ and publish it to the
# UAT bucket under uat.themeontology.org/<branch>/. The heavy lifting (corpus -> index ->
# embeddings -> pages -> S3/CloudFront) lives in totolo-search-web; this job only fires a
# repository_dispatch carrying the branch name, so no AWS credentials live in this repo.
#
# Setup (one-time): create a fine-grained PAT scoped to theme-ontology/totolo-search-web
# with "Contents: read" and "Actions: read and write", and add it here as the repository
# secret SEARCH_WEB_DISPATCH_TOKEN. (The built-in GITHUB_TOKEN cannot trigger workflows in
# another repository.)

on:
  push:
    branches:
      - dev-themes
      - dev-stories
      # Add any other branch you want mirrored to uat.themeontology.org/<branch>/ here.
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to publish (defaults to the current ref)'
        required: false

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger totolo-search-web branch build
        env:
          GH_TOKEN: ${{ secrets.SEARCH_WEB_DISPATCH_TOKEN }}
          BRANCH: ${{ github.event.inputs.branch || github.ref_name }}
        run: |
          echo "Dispatching track-branch for '$BRANCH' to totolo-search-web…"
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            /repos/theme-ontology/totolo-search-web/dispatches \
            -f event_type=track-branch \
            -F "client_payload[ref]=$BRANCH"
